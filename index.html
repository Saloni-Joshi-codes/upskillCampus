<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog CMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Content Management System</h1>
    <p>Blog Management Portal</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Blogs</a>
    <a href="#">Dashboard</a>
    <a href="#">Login</a>
</nav>

<div class="container">

    <h2>Create New Blog</h2>

    <form id="blogForm">
        <input type="text" id="title" placeholder="Blog Title" required><br><br>

        <textarea id="content" placeholder="Blog Content" required></textarea><br><br>

        <input type="text" id="author" placeholder="Author Name" required><br><br>

        <button type="submit">Add Blog</button>
    </form>

    <hr><br>

    <h2>Latest Blogs</h2>

    <div id="blogList"></div>

</div>

    
<footer>
    <p>© 2026 Blog CMS | Internship Project</p>
</footer>

<script src="script.js"></script>

</body>
</html>
